<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <link rel="shortcut icon" href="../logokitty.png" type="image/x-icon"
</head>

<div class="formulario-contacto">
 <div class="container">
        <h2>¡Empieza a gatificar su rincón favorito!</h3>
        <form>
            <label for="name">Su nombre</label>
            <input type="text" id="name" placeholder="Introduce tu nombre">

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="Introduzca su dirección de correo">

            <label for="services">Servicios necesarios</label>
            <select id="services">
                <option>Elija Servicios</option>
                <option>Productos Personalizados</option>
                <option>Circuitos Personalizados</option>
                <option>Gimnasios</option>
            </select>

            <label for="budget">Presupuesto</label>
            <select id="budget">
                <option>Seleccione Presupuesto</option>
                <option>Bajo</option>
                <option>Medio</option>
                <option>Alto</option>
            </select>

            <label for="message">Mensaje</label>
            <textarea id="message" placeholder="Tu mensaje aquí..."></textarea>

            <button type="submit" class="submit-btn">Enviar →</button>
        </form>
    </div>
</div>

</html>
